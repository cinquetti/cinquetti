name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
  push:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake (Light)
        uses: Platane/snk@v3
        with:
          github_user_name: cinquetti
          outputs: dist/snake.svg

      - name: Generate Snake (Dark)
        uses: Platane/snk@v3
        with:
          github_user_name: cinquetti
          color_snake: "#39D353"
          color_dots: "#0D1117"
          outputs: dist/snake-dark.svg

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 
